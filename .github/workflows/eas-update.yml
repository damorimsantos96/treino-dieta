name: EAS Update

on:
  push:
    branches:
      - master

jobs:
  update:
    name: Publish Android OTA
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL || secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Set EXPO_TOKEN in this repository's Actions secrets before publishing EAS updates."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Validate public build config
        run: npm run check:build-env

      - name: Publish preview update
        run: eas update --channel preview --platform android --message "push ${GITHUB_SHA}"

      - name: Publish production update
        run: eas update --channel production --platform android --message "push ${GITHUB_SHA}"
